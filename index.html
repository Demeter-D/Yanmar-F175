<style>
  :root {
    --paper: #f4efe6;
    --paper-2: #ebe4d6;
    --ink: #1a1714;
    --ink-2: #3a342d;
    --ink-3: #6b6258;
    --rule: #d4ccbb;
    --accent: #d4541c; /* safety orange */
    --accent-soft: #f0c9b3;
    --warn: #b4862a;
    --good: #4a6b3a;
    --bad: #a13a2a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: "Space Grotesk", system-ui, sans-serif; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }
  body { min-height: 100vh; min-height: 100dvh; overflow-x: hidden; }
  body.no-scroll { overflow: hidden; }
  .mono { font-family: "JetBrains Mono", ui-monospace, monospace; font-variant-numeric: tabular-nums; }
  .serif { font-family: "Instrument Serif", serif; }
  ::selection { background: var(--accent); color: var(--paper); }

  /* App shell */
  .app { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; min-height: 100dvh; }

  /* Sidebar (desktop) */
  .rail {
    background: var(--ink); color: var(--paper); padding: 28px 22px; position: sticky; top: 0;
    height: 100vh; height: 100dvh; overflow-y: auto; display: flex; flex-direction: column; gap: 24px;
    border-right: 1px solid #000;
  }

  /* Mobile header (hidden on desktop) */
  .topbar { display: none; }
  .scrim { display: none; }

  @media (max-width: 880px) {
    .app { grid-template-columns: 1fr; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      position: sticky; top: 0; z-index: 40;
      background: var(--ink); color: var(--paper);
      padding: calc(env(safe-area-inset-top, 0) + 12px) 16px 12px;
      padding-left: calc(env(safe-area-inset-left, 0) + 16px);
      padding-right: calc(env(safe-area-inset-right, 0) + 16px);
      border-bottom: 1px solid #000;
    }
    .topbar-brand { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; transition: opacity .15s ease; background: none; border: 0; padding: 0; color: inherit; text-align: left; font: inherit; }
    .topbar-brand:hover { opacity: 0.7; }
    .topbar-brand:focus-visible { outline: 2px solid var(--accent); outline-offset: 4px; border-radius: 2px; }
    .topbar-glyph { width: 28px; height: 28px; background: var(--accent); display: grid; place-items: center; font-family: "JetBrains Mono", monospace; font-weight: 600; color: #1a1714; font-size: 13px; }
    .topbar-title { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #a89e90; line-height: 1; }
    .topbar-model { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; line-height: 1.1; margin-top: 2px; }
    .topbar-active { font-family: "JetBrains Mono", monospace; font-size: 11px; color: #a89e90; text-align: right; max-width: 50%; }
    .topbar-active strong { display: block; color: var(--paper); font-family: "Space Grotesk", sans-serif; font-size: 13px; font-weight: 500; margin-top: 2px; }
    .menu-btn {
      background: transparent; border: 1px solid #2a2520; color: var(--paper);
      width: 44px; height: 44px; display: grid; place-items: center; cursor: pointer; padding: 0;
      font-family: inherit;
    }
    .menu-btn:active { background: #2a2520; }
    .menu-btn svg { width: 20px; height: 20px; }

    .rail {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 86vw; max-width: 320px; height: 100vh; height: 100dvh;
      z-index: 60; transform: translateX(-100%); transition: transform 240ms ease;
      padding: calc(env(safe-area-inset-top, 0) + 22px) 22px calc(env(safe-area-inset-bottom, 0) + 22px);
      padding-left: calc(env(safe-area-inset-left, 0) + 22px);
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
    }
    .rail.open { transform: translateX(0); }
    .scrim {
      display: block; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 50;
      opacity: 0; pointer-events: none; transition: opacity 240ms ease;
    }
    .scrim.show { opacity: 1; pointer-events: auto; }
    .rail-close {
      align-self: flex-end; background: transparent; border: 1px solid #2a2520; color: var(--paper);
      width: 36px; height: 36px; cursor: pointer; padding: 0; display: grid; place-items: center; margin-top: -8px;
    }
    main { padding-bottom: env(safe-area-inset-bottom, 0); }
  }
  @media (min-width: 881px) { .rail-close { display: none; } }
  .brand { display: flex; flex-direction: column; gap: 4px; padding-bottom: 18px; border-bottom: 1px solid #2a2520; }
  .brand-mark { display: flex; align-items: center; gap: 10px; }
  .brand-glyph { width: 30px; height: 30px; background: var(--accent); display: grid; place-items: center; font-family: "JetBrains Mono", monospace; font-weight: 600; color: #1a1714; font-size: 14px; }
  .brand-title { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #a89e90; font-weight: 500; }
  .brand-model { font-size: 26px; font-weight: 600; letter-spacing: -0.02em; }
  .brand-sub { font-size: 12px; color: #a89e90; font-family: "JetBrains Mono", monospace; }

  .nav { display: flex; flex-direction: column; gap: 2px; }
  .nav-group { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #6b6258; padding: 14px 0 6px; }
  .nav-item {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 12px 12px; border: none; background: transparent; color: #c9c0b1; text-align: left;
    font-family: inherit; font-size: 14px; cursor: pointer; border-left: 2px solid transparent;
    transition: all 120ms ease; min-height: 44px;
  }
  .nav-item:hover { color: var(--paper); background: #2a2520; }
  .nav-item.active { color: var(--paper); border-left-color: var(--accent); background: #2a2520; }
  .nav-item .num { font-family: "JetBrains Mono", monospace; font-size: 11px; color: #6b6258; }
  .nav-item.active .num { color: var(--accent); }

  .rail-foot { margin-top: auto; padding-top: 18px; border-top: 1px solid #2a2520; font-size: 11px; color: #6b6258; line-height: 1.6; }

  /* Main */
  main { padding: 0; min-width: 0; }
  .doc { max-width: 980px; margin: 0 auto; padding: 56px 56px 120px; }
  @media (max-width: 880px) { .doc { padding: 24px 18px 80px; }
    .doc { padding-left: calc(env(safe-area-inset-left, 0) + 18px); padding-right: calc(env(safe-area-inset-right, 0) + 18px); }
  }

  /* Section header */
  .sec-head { display: flex; align-items: baseline; gap: 18px; padding-bottom: 18px; border-bottom: 1px solid var(--rule); margin-bottom: 32px; flex-wrap: wrap; }
  .sec-num { font-family: "JetBrains Mono", monospace; font-size: 12px; color: var(--ink-3); letter-spacing: 0.1em; }
  .sec-title { font-size: clamp(32px, 7vw, 44px); font-weight: 500; letter-spacing: -0.025em; line-height: 1; margin: 0; }
  .sec-title .it { font-family: "Instrument Serif", serif; font-style: italic; font-weight: 400; }
  .sec-lede { font-size: clamp(15px, 4vw, 17px); color: var(--ink-2); line-height: 1.55; max-width: 62ch; margin-bottom: 36px; }

  h3 { font-size: clamp(18px, 5vw, 22px); font-weight: 500; letter-spacing: -0.015em; margin: 40px 0 16px; }
  h4 { font-size: 14px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-2); margin: 28px 0 12px; }
  p { line-height: 1.6; color: var(--ink-2); margin: 0 0 14px; }

  /* Cards & boxes */
  .grid { display: grid; gap: 12px; }
  .grid-2 { grid-template-columns: 1fr 1fr; }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  @media (max-width: 720px) { .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; } .grid-2 { grid-template-columns: 1fr; } }

  .stat { background: var(--paper-2); border: 1px solid var(--rule); padding: 16px 18px; }
  .stat-label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 6px; }
  .stat-value { font-family: "JetBrains Mono", monospace; font-size: 20px; font-weight: 500; color: var(--ink); }
  .stat-unit { font-size: 12px; color: var(--ink-3); margin-left: 4px; }

  .callout { border-left: 3px solid var(--accent); background: #f9ede4; padding: 14px 18px; margin: 20px 0; font-size: 14px; color: var(--ink-2); line-height: 1.55; }
  .callout.warn { border-left-color: var(--warn); background: #f5ecd4; }
  .callout.danger { border-left-color: var(--bad); background: #f5dcd6; }
  .callout-tag { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; display: block; }
  .callout.warn .callout-tag { color: var(--warn); }
  .callout.danger .callout-tag { color: var(--bad); }

  /* Procedure / steps */
  .proc { border: 1px solid var(--rule); background: var(--paper-2); margin: 24px 0 36px; }
  .proc-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--rule); cursor: pointer; user-select: none; flex-wrap: wrap; }
  .proc-head:hover { background: #e2dac8; }
  .proc-title { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; min-width: 0; }
  .proc-tag { font-family: "JetBrains Mono", monospace; font-size: 11px; padding: 3px 7px; background: var(--ink); color: var(--paper); letter-spacing: 0.06em; flex-shrink: 0; }
  .proc-name { font-size: clamp(16px, 4.5vw, 19px); font-weight: 500; letter-spacing: -0.01em; }
  .proc-meta { display: flex; gap: 14px; font-size: 11px; color: var(--ink-3); font-family: "JetBrains Mono", monospace; align-items: center; flex-wrap: wrap; }
  @media (max-width: 540px) {
    .proc-meta span:not(.proc-chev) { display: none; }
    .proc-body { padding: 18px 16px 22px !important; }
    .step { padding: 12px 0; }
  }
  .proc-meta strong { color: var(--ink); font-weight: 500; }
  .proc-chev { width: 24px; height: 24px; display: grid; place-items: center; transition: transform 200ms ease; color: var(--ink-3); }
  .proc.open .proc-chev { transform: rotate(90deg); }
  .proc-body { padding: 22px 24px 28px; display: none; }
  .proc.open .proc-body { display: block; }

  .step-bar { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; padding: 10px 14px; background: var(--paper); border: 1px solid var(--rule); }
  .step-bar-progress { flex: 1; height: 4px; background: var(--rule); position: relative; overflow: hidden; }
  .step-bar-progress::after { content: ""; position: absolute; inset: 0; background: var(--accent); transform-origin: left; transform: scaleX(var(--p, 0)); transition: transform 250ms ease; }
  .step-bar-text { font-family: "JetBrains Mono", monospace; font-size: 12px; color: var(--ink-3); }
  .step-bar button { font-family: inherit; font-size: 11px; padding: 4px 10px; background: transparent; border: 1px solid var(--rule); color: var(--ink-2); cursor: pointer; letter-spacing: 0.04em; text-transform: uppercase; }
  .step-bar button:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .step { display: grid; grid-template-columns: 28px 1fr; gap: 14px; padding: 14px 0; border-top: 1px dashed var(--rule); }
  .step:first-of-type { border-top: 0; padding-top: 4px; }
  .step-check {
    width: 22px; height: 22px; border: 1.5px solid var(--ink-3); background: var(--paper); cursor: pointer;
    display: grid; place-items: center; padding: 0; transition: all 120ms ease; margin-top: 2px;
  }
  .step-check:hover { border-color: var(--accent); }
  .step-check.done { background: var(--accent); border-color: var(--accent); }
  .step-check.done::after { content: "✓"; color: var(--paper); font-size: 14px; line-height: 1; font-weight: 600; }
  .step-body .step-num { font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--ink-3); letter-spacing: 0.06em; margin-right: 8px; }
  .step-body .step-text { font-size: 15px; line-height: 1.55; color: var(--ink); }
  .step.done .step-body .step-text { color: var(--ink-3); text-decoration: line-through; text-decoration-color: var(--ink-3); text-decoration-thickness: 1px; }
  .step-tip { font-size: 13px; color: var(--ink-3); margin-top: 6px; line-height: 1.5; }
  .step-tip .mono-pill { display: inline-block; padding: 1px 6px; background: var(--paper-2); border: 1px solid var(--rule); font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--ink); margin: 0 2px; }

  /* Parts inline pill in procedures */
  .parts-strip { display: flex; flex-wrap: wrap; gap: 8px; margin: 6px 0 18px; }
  .part-pill { display: inline-flex; align-items: center; gap: 8px; padding: 6px 10px; background: var(--paper); border: 1px solid var(--rule); font-size: 12px; }
  .part-pill .mono { font-size: 11px; color: var(--ink); }
  .part-pill .label { color: var(--ink-3); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; }

  /* Tables */
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 11px 14px; border-bottom: 1px solid var(--rule); vertical-align: top; }
  th { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-3); font-weight: 500; background: var(--paper-2); border-bottom: 1px solid var(--rule); border-top: 1px solid var(--rule); }
  td.mono, th.mono { font-family: "JetBrains Mono", monospace; font-size: 13px; }
  tr:hover td { background: #efe9dc; }

  /* Mobile: spec rows stack */
  @media (max-width: 540px) {
    .specblock { grid-template-columns: 1fr; }
    .specblock .k { border-bottom: none; padding-bottom: 4px; }
    .specblock .v { padding-top: 4px; padding-bottom: 12px; }
  }

  /* Mobile parts cards (alt to wide table) */
  .parts-cards { display: none; }
  @media (max-width: 720px) {
    .parts-table-wrap { display: none; }
    .parts-cards { display: flex; flex-direction: column; gap: 10px; }
    .pcard { background: var(--paper-2); border: 1px solid var(--rule); padding: 14px; }
    .pcard-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
    .pcard-name { font-size: 15px; font-weight: 500; line-height: 1.3; }
    .pcard-cat { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); white-space: nowrap; padding-top: 3px; }
    .pcard-row { display: grid; grid-template-columns: 70px 1fr; gap: 8px; padding: 6px 0; border-top: 1px dashed var(--rule); font-size: 13px; }
    .pcard-row .k { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); padding-top: 3px; }
    .pcard-row .v { color: var(--ink); word-break: break-word; }
    .pcard-alts { display: flex; flex-wrap: wrap; gap: 4px; }
    .pcard-alt { font-family: "JetBrains Mono", monospace; font-size: 11px; padding: 2px 6px; background: var(--paper); border: 1px solid var(--rule); }
    .pcard-notes { font-size: 12px; color: var(--ink-3); margin-top: 2px; line-height: 1.4; }
  }
  @media (max-width: 540px) {
    /* For non-parts tables, allow horizontal scroll inside wrap */
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0 -18px; padding: 0 18px; }
    .table-scroll table { min-width: 480px; }
  }

  /* Schedule timeline */
  .timeline { position: relative; padding-left: 32px; margin: 16px 0 28px; }
  .timeline::before { content: ""; position: absolute; left: 7px; top: 8px; bottom: 8px; width: 2px; background: var(--rule); }
  .tl-row { position: relative; padding: 14px 0 14px 14px; display: grid; grid-template-columns: 130px 1fr; gap: 24px; align-items: start; border-bottom: 1px dashed var(--rule); }
  @media (max-width: 540px) {
    .tl-row { grid-template-columns: 1fr; gap: 8px; padding: 12px 0; }
  }
  .tl-row:last-child { border-bottom: 0; }
  .tl-row::before { content: ""; position: absolute; left: -32px; top: 22px; width: 16px; height: 16px; background: var(--paper); border: 2px solid var(--ink); border-radius: 50%; }
  .tl-row.major::before { background: var(--accent); border-color: var(--accent); }
  .tl-hours { font-family: "JetBrains Mono", monospace; font-size: 14px; color: var(--ink); font-weight: 500; }
  .tl-hours small { display: block; font-size: 11px; color: var(--ink-3); font-weight: 400; margin-top: 2px; }
  .tl-tasks { display: flex; flex-wrap: wrap; gap: 6px; }
  .tl-task { background: var(--paper-2); border: 1px solid var(--rule); padding: 6px 11px; font-size: 12px; color: var(--ink-2); font-family: inherit; cursor: pointer; transition: all 120ms ease; }
  .tl-task:hover { background: var(--paper); border-color: var(--ink-3); transform: translateY(-1px); }
  .tl-task.replace { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .tl-task.replace:hover { background: var(--accent); border-color: var(--accent); }
  .tl-task.check { background: var(--paper); }

  /* Search */
  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .search-input {
    flex: 1; min-width: 100%; padding: 12px 14px; background: var(--paper-2); border: 1px solid var(--rule);
    font-family: inherit; font-size: 16px; color: var(--ink); min-height: 44px;
  }
  @media (min-width: 540px) { .search-input { min-width: 220px; font-size: 14px; } }
  .search-input:focus { outline: none; border-color: var(--accent); background: var(--paper); }
  .filter-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip { padding: 9px 14px; background: var(--paper-2); border: 1px solid var(--rule); font-size: 13px; color: var(--ink-2); cursor: pointer; font-family: inherit; min-height: 36px; }
  .chip:hover { background: var(--paper); }
  .chip.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* Image placeholder */
  .figure { background: repeating-linear-gradient(45deg, #e8e0cf, #e8e0cf 8px, #e2dac8 8px, #e2dac8 16px); border: 1px solid var(--rule); aspect-ratio: 16 / 9; display: grid; place-items: center; color: var(--ink-3); font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; margin: 16px 0; position: relative; }
  .figure-tag { position: absolute; top: 10px; left: 10px; background: var(--paper); padding: 4px 8px; border: 1px solid var(--rule); }
  .figure-cap { position: absolute; bottom: -22px; left: 0; right: 0; font-family: "Space Grotesk"; font-size: 12px; color: var(--ink-3); text-transform: none; letter-spacing: 0; }

  /* Pictogram (simple) */
  .pict { width: 100%; aspect-ratio: 4 / 3; background: var(--paper); border: 1px solid var(--rule); position: relative; overflow: hidden; }
  .pict svg { width: 100%; height: 100%; display: block; }

  /* Spec block */
  .specblock { display: grid; grid-template-columns: 200px 1fr; gap: 0; border-top: 1px solid var(--rule); }
  .specblock > div { padding: 10px 14px; border-bottom: 1px solid var(--rule); }
  .specblock .k { font-size: 12px; color: var(--ink-3); letter-spacing: 0.04em; background: var(--paper-2); }
  .specblock .v { font-family: "JetBrains Mono", monospace; font-size: 13px; color: var(--ink); }

  /* Hero */
  .hero { padding: 48px 0 8px; }
  @media (max-width: 880px) { .hero { padding: 16px 0 8px; } }

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

function Procedure({ p, openByDefault = false }) {
  const [open, setOpen] = React.useState(openByDefault);
  const [checked, setChecked] = React.useState(() => p.steps.map(() => false));
  const done = checked.filter(Boolean).length;
  const pct = done / p.steps.length;

  const toggle = (i) => setChecked(prev => prev.map((v, idx) => idx === i ? !v : v));
  const reset = (e) => { e.stopPropagation(); setChecked(p.steps.map(() => false)); };

  return (

function ServiceLog() {
  const [rows, setRows] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem("f175-log") || "[]"); }
    catch { return []; }
  });
  const [draft, setDraft] = React.useState({date: "", hours: "", work: ""});

  React.useEffect(() => {
    localStorage.setItem("f175-log", JSON.stringify(rows));
  }, [rows]);

  const add = () => {
    if (!draft.date && !draft.hours && !draft.work) return;
    setRows([{...draft, id: Date.now()}, ...rows]);
    setDraft({date: "", hours: "", work: ""});
  };
  const del = (id) => setRows(rows.filter(r => r.id !== id));

  return (
    <div>
      <p style={{fontSize: 14}}>A persistent service log lives in your browser. Useful for keeping track between visits; not a substitute for the paper book that lives with the tractor.</p>
      <div className="log-grid">
        <input className="search-input" placeholder="Date" value={draft.date} onChange={e => setDraft({...draft, date: e.target.value})}/>
        <input className="search-input" placeholder="Hours" inputMode="numeric" value={draft.hours} onChange={e => setDraft({...draft, hours: e.target.value})}/>
        <input className="search-input work" placeholder="Work carried out (oil & filter, greased linkage, etc.)" value={draft.work} onChange={e => setDraft({...draft, work: e.target.value})}/>
        <button className="add" onClick={add} style={{padding: "12px 22px", background: "var(--accent)", color: "var(--paper)", border: "none", cursor: "pointer", letterSpacing: "0.06em", textTransform: "uppercase", fontSize: 12, fontFamily: "inherit", fontWeight: 600}}>Add entry</button>
      </div>
      {rows.length > 0 ? (
        <div className="table-scroll">
          <table>
            <thead><tr><th style={{width: 120}}>Date</th><th style={{width: 80}}>Hours</th><th>Work</th><th style={{width: 30}}></th></tr></thead>
            <tbody>
              {rows.map(r => (
                <tr key={r.id}>
                  <td className="mono">{r.date || "—"}</td>
                  <td className="mono">{r.hours || "—"}</td>
                  <td>{r.work}</td>
                  <td><button onClick={() => del(r.id)} style={{background: "transparent", border: "none", color: "var(--ink-3)", cursor: "pointer", fontSize: 20, padding: "4px 8px", minHeight: 32}}>×</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      ) : (
        <div style={{padding: 24, textAlign: "center", color: "var(--ink-3)", border: "1px dashed var(--rule)", fontSize: 13}}>
          No entries yet. Add the next service and it'll stick around until you clear your browser.
        </div>
      )}
    </div>
  );
}

    const observer = new IntersectionObserver((entries) => {
      // pick the entry closest to the top that is intersecting
      const visible = entries.filter(e => e.isIntersecting)
        .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
      if (visible[0]) setActive(visible[0].target.dataset.section);
    }, { rootMargin: "-10% 0px -70% 0px", threshold: 0 });

    document.querySelectorAll("section[data-section]").forEach(s => observer.observe(s));
    return () => observer.disconnect();
  }, []);

  // Lock body scroll when drawer open
  useEffect(() => {
    document.body.classList.toggle("no-scroll", drawerOpen);
  }, [drawerOpen]);

  // Close drawer on escape
  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") setDrawerOpen(false); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  const goTo = (id) => {
    setDrawerOpen(false);
    // Wait one frame so the drawer can begin closing before scroll
    requestAnimationFrame(() => {
      const el = document.querySelector(`section[data-section="${id}"]`);
      if (el) {
        const top = el.getBoundingClientRect().top + window.scrollY - 20;
        window.scrollTo({ top, behavior: "smooth" });
      }
    });
  };

  const TweaksPanel = window.TweaksPanel;
  const TweakSection = window.TweakSection;
  const TweakRadio = window.TweakRadio;
  const TweakColor = window.TweakColor;

  const activeNav = NAV.find(n => n.id === active) || NAV[0];

  return (
    <div className="app">
      <header className="topbar">
        <div
          className="topbar-brand"
          onClick={() => goTo("overview")}
          onKeyDown={(e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); goTo("overview"); } }}
          role="button"
          tabIndex={0}
          title="Back to cover"
          aria-label="Back to cover"
        >
          <div className="topbar-glyph">Y</div>
          <div>
            <div className="topbar-title">F175 Service</div>
            <div className="topbar-model">{activeNav.label}</div>
          </div>
        </div>
        <button className="menu-btn" onClick={() => setDrawerOpen(true)} aria-label="Open menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">
            <path d="M4 7h16M4 12h16M4 17h16"/>
          </svg>
        </button>
      </header>

      <div className={"scrim" + (drawerOpen ? " show" : "")} onClick={() => setDrawerOpen(false)} />

      <aside className={"rail" + (drawerOpen ? " open" : "")}>
        <button className="rail-close" onClick={() => setDrawerOpen(false)} aria-label="Close menu">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
            <path d="M6 6l12 12M18 6L6 18"/>
          </svg>
        </button>
        <div className="brand">
          <div className="brand-mark">
            <div className="brand-glyph">Y</div>
            <div>
              <div className="brand-title">Service Manual</div>
              <div className="brand-model">F175</div>
            </div>
          </div>
          <div className="brand-sub">3T75HA · 17 hp · 4WD</div>
        </div>

        <nav className="nav">
          <div className="nav-group">Contents</div>
          {NAV.map(n => (
            <button
              key={n.id}
              className={"nav-item" + (active === n.id ? " active" : "")}
              onClick={() => goTo(n.id)}
            >
              <span>{n.label}</span>
              <span className="num">{n.num}</span>
            </button>
          ))}
        </nav>

        <div className="rail-foot">
          Edition 2026 · UK<br/>
          Compiled for grey-import F175s.<br/>
          Verify part numbers against the engine plate before ordering.
        </div>
      </aside>

      <main>
        <div className="doc">
          <SectionOverview />
          <div style={{height: 80}}/>
          <SectionSchedule />
          <div style={{height: 80}}/>
          <SectionFilters />
          <div style={{height: 80}}/>
          <SectionFluids />
          <div style={{height: 80}}/>
          <SectionAdjustments />
          <div style={{height: 80}}/>
          <SectionInspections />
          <div style={{height: 80}}/>
          <SectionParts />
          <div style={{height: 80}}/>
          <SectionTorque />
        </div>
      </main>

      {TweaksPanel && (
        <TweaksPanel title="Tweaks">
          <TweakSection label="Accent">
            <TweakColor
              label="Colour"
              value={tweaks.accent}
              onChange={(v) => setTweak("accent", v)}
              options={["#d4541c", "#2a6fdb", "#1f8a5b", "#8b3a3a"]}
            />
          </TweakSection>
          <TweakSection label="Paper">
            <TweakRadio
              label="Tone"
              value={tweaks.paperTone}
              onChange={(v) => setTweak("paperTone", v)}
              options={[
                { value: "warm", label: "Warm" },
                { value: "neutral", label: "Neutral" },
                { value: "cool", label: "Cool" },
              ]}
            />
          </TweakSection>
          <TweakSection label="Density">
            <TweakRadio
              label="Type"
              value={tweaks.density}
              onChange={(v) => setTweak("density", v)}
              options={[
                { value: "compact", label: "Compact" },
                { value: "comfortable", label: "Normal" },
                { value: "spacious", label: "Roomy" },
              ]}
            />
          </TweakSection>
        </TweaksPanel>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
